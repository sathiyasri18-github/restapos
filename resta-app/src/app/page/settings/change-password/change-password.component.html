<div class="page-header">
  <h1>Change password</h1>
  <p class="page-subtitle">Update your account password</p>
</div>

<div class="form-card" style="max-width: 480px;">
  <form (ngSubmit)="submit()">
    <div class="auth-field">
      <label for="currentPassword">Current password</label>
      <p-password id="currentPassword" [(ngModel)]="currentPassword" name="currentPassword" [feedback]="false"
        [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
      @if (errors['currentPassword']) { <span class="error">{{ errors['currentPassword'] }}</span> }
    </div>

    <div class="auth-field">
      <label for="newPassword">New password</label>
      <p-password id="newPassword" [(ngModel)]="newPassword" name="newPassword" [feedback]="true" [toggleMask]="true"
        styleClass="w-full" inputStyleClass="w-full" />
      @if (errors['newPassword']) { <span class="error">{{ errors['newPassword'] }}</span> }
    </div>

    <div class="auth-field">
      <label for="confirmPassword">Confirm new password</label>
      <p-password id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" [feedback]="false"
        [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
      @if (errors['confirmPassword']) { <span class="error">{{ errors['confirmPassword'] }}</span> }
    </div>

    <p-button type="submit" label="Update password" [loading]="isLoading" />
  </form>
</div>
<p-toast />
