<div class="auth-page">
  <div class="auth-card">
    <h1>Forgot password</h1>
    <p class="subtitle">Enter your email and we'll send reset instructions if the account exists.</p>

    @if (!submitted) {
      <form (ngSubmit)="submit()">
        <div class="auth-field">
          <label for="email">Email</label>
          <input pInputText id="email" type="email" [(ngModel)]="email" name="email" class="w-full" />
          @if (error) { <span class="error">{{ error }}</span> }
        </div>
        <div class="auth-actions">
          <p-button type="submit" label="Send reset link" [loading]="isLoading" />
        </div>
      </form>
    } @else {
      <p>Check your email for reset instructions.</p>
      @if (devResetToken) {
        <div class="auth-dev-hint">
          <strong>Development token</strong> (use on reset page):<br />
          {{ devResetToken }}
        </div>
      }
    }

    <div class="auth-links">
      <a routerLink="/sign-in">Back to sign in</a>
    </div>
  </div>
</div>
<p-toast />
