<div class="auth-page">
  <div class="auth-card">
    <h1>Reset password</h1>
    <p class="subtitle">Enter your new password</p>

    <form (ngSubmit)="submit()">
      <div class="auth-field">
        <label for="token">Reset token</label>
        <input pInputText id="token" [(ngModel)]="token" name="token" class="w-full" />
        @if (errors['token']) { <span class="error">{{ errors['token'] }}</span> }
      </div>

      <div class="auth-field">
        <label for="password">New password</label>
        <p-password id="password" [(ngModel)]="password" name="password" [feedback]="true" [toggleMask]="true"
          styleClass="w-full" inputStyleClass="w-full" />
        @if (errors['password']) { <span class="error">{{ errors['password'] }}</span> }
      </div>

      <div class="auth-field">
        <label for="confirmPassword">Confirm password</label>
        <p-password id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" [feedback]="false"
          [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
        @if (errors['confirmPassword']) { <span class="error">{{ errors['confirmPassword'] }}</span> }
      </div>

      <div class="auth-actions">
        <p-button type="submit" label="Reset password" [loading]="isLoading" />
      </div>
    </form>

    <div class="auth-links">
      <a routerLink="/sign-in">Back to sign in</a>
    </div>
  </div>
</div>
<p-toast />
