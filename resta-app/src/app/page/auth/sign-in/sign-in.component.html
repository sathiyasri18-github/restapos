<div class="auth-page">
  <div class="auth-card">
    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to access System Service</p>

    <form (ngSubmit)="submit()">
      <div class="auth-field">
        <label for="userName">User name</label>
        <input pInputText id="userName" [(ngModel)]="userName" name="userName" class="w-full" autocomplete="username" />
        @if (errors.userName) { <span class="error">{{ errors.userName }}</span> }
      </div>

      <div class="auth-field">
        <label for="password">Password</label>
        <p-password id="password" [(ngModel)]="password" name="password" [feedback]="false" [toggleMask]="true"
          styleClass="w-full" inputStyleClass="w-full" autocomplete="current-password" />
        @if (errors.password) { <span class="error">{{ errors.password }}</span> }
      </div>

      <div class="auth-actions">
        <p-button type="submit" label="Sign in" [loading]="isLoading" />
      </div>
    </form>

    <div class="auth-links">
      <a routerLink="/forgot-password">Forgot password?</a>
      <br /><br />
      Don't have an account? <a routerLink="/sign-up">Sign up</a>
    </div>
  </div>
</div>
<p-toast />
